<div class="login-container">
  <div class="login-card">
    <div class="login-header">
      <h1 class="font-code-md tracking-widest uppercase">Admin Login</h1>
      <p class="text-secondary">Sign in to manage your portfolio</p>
    </div>
    
    <form [formGroup]="loginForm" (ngSubmit)="onSubmit()" class="login-form">
      <div class="form-group">
        <label for="username" class="font-code-sm uppercase">Username</label>
        <input 
          id="username" 
          type="text" 
          formControlName="username" 
          class="stitch-input"
          placeholder="Enter username"
        >
      </div>
      
      <div class="form-group">
        <label for="password" class="font-code-sm uppercase">Password</label>
        <input 
          id="password" 
          type="password" 
          formControlName="password" 
          class="stitch-input"
          placeholder="Enter password"
        >
      </div>

      <div *ngIf="error" class="error-message">
        {{ error }}
      </div>
      
      <button 
        type="submit" 
        class="stitch-button w-full"
        [disabled]="loginForm.invalid || loading"
      >
        <span *ngIf="!loading">Sign In</span>
        <span *ngIf="loading">Signing In...</span>
      </button>
    </form>
    
    <div class="login-footer">
      <a routerLink="/" class="stitch-link">
        <i class="pi pi-arrow-left"></i>
        <span>Back to Portfolio</span>
      </a>
    </div>
  </div>
</div>
