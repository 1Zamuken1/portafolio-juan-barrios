<p-toast />
<p-confirmDialog />

<div class="admin-section-header">
  <h2 class="font-code-lg">Habilidades</h2>
  <button pButton label="+ Nueva Habilidad" class="p-button-sm" (click)="createNew()"></button>
</div>

<div *ngIf="loading" class="loading-state" style="padding: 3rem; text-align: center;">
  <i class="pi pi-spin pi-spinner" style="font-size: 2rem"></i>
  <p style="margin-top: 1rem;">Cargando habilidades...</p>
</div>

<div *ngIf="!loading">
  <p-table 
    [value]="skills" 
    [paginator]="true"
    [rows]="15"
    [showCurrentPageReport]="true"
    currentPageReportTemplate="Mostrando {first} a {last} de {totalRecords} habilidades"
    styleClass="p-datatable-sm p-datatable-striped"
  >
    <ng-template pTemplate="header">
      <tr>
        <th style="width: 60px">ID</th>
        <th>Nombre</th>
        <th>Categoría</th>
        <th>Icono</th>
        <th>Color</th>
        <th style="width: 80px">Orden</th>
        <th style="width: 180px">Acciones</th>
      </tr>
    </ng-template>

    <ng-template pTemplate="body" let-skill>
      <tr>
        <td>{{ skill.id }}</td>
        <td><strong>{{ skill.name }}</strong></td>
        <td>
          <p-tag [value]="skill.category" [rounded]="true" />
        </td>
        <td>
          <i [class]="skill.icon" [style.color]="skill.color" style="font-size: 1.25rem"></i>
          <span style="margin-left: 0.5rem; font-size: 0.75rem; opacity: 0.6">{{ skill.icon }}</span>
        </td>
        <td>
          <span class="color-preview" [style.background]="skill.color"></span>
          <span style="font-size: 0.75rem; opacity: 0.6">{{ skill.color }}</span>
        </td>
        <td>{{ skill.displayOrder }}</td>
        <td>
          <div class="action-buttons">
            <button pButton icon="pi pi-pencil" class="p-button-sm p-button-text p-button-info" (click)="editSkill(skill)" pTooltip="Editar"></button>
            <button pButton icon="pi pi-trash" class="p-button-sm p-button-text p-button-danger" (click)="confirmDelete(skill)" pTooltip="Eliminar"></button>
          </div>
        </td>
      </tr>
    </ng-template>

    <ng-template pTemplate="emptymessage">
      <tr>
        <td colspan="7" style="text-align: center; padding: 2rem;">
          <p>No hay habilidades. Haz clic en <strong>+ Nueva Habilidad</strong> para crear una.</p>
        </td>
      </tr>
    </ng-template>
  </p-table>
</div>
