<p-toast />

<div class="form-header">
  <h2 class="font-code-lg">{{ isEditMode ? 'Editar' : 'Nueva' }} Habilidad</h2>
</div>

<div *ngIf="loading" class="loading-state" style="padding: 3rem; text-align: center;">
  <i class="pi pi-spin pi-spinner" style="font-size: 2rem"></i>
  <p style="margin-top: 1rem;">Cargando...</p>
</div>

<form *ngIf="!loading" [formGroup]="form" (ngSubmit)="onSubmit()" class="admin-form">
  
  <div class="form-row">
    <!-- Name -->
    <div class="form-group flex-1">
      <label for="name">Nombre *</label>
      <input pInputText id="name" formControlName="name" placeholder="Ej: Angular, Spring Boot" />
    </div>

    <!-- Category -->
    <div class="form-group flex-1">
      <label for="category">Categoría *</label>
      <p-select [options]="categoryOptions" formControlName="category" id="category" [style]="{'width':'100%'}"></p-select>
    </div>
  </div>

  <div class="form-row">
    <!-- Icon -->
    <div class="form-group flex-1">
      <label for="icon">Icono (Clase CSS) *</label>
      <input pInputText id="icon" formControlName="icon" placeholder="Ej: pi pi-star, fab fa-angular" />
    </div>

    <!-- Color -->
    <div class="form-group flex-1">
      <label for="color">Color Hexadecimal *</label>
      <input pInputText id="color" formControlName="color" placeholder="Ej: #FF0000" />
    </div>
  </div>

  <!-- Display Order -->
  <div class="form-group">
    <label for="displayOrder">Orden de Visualización</label>
    <p-inputNumber id="displayOrder" formControlName="displayOrder" [showButtons]="true" [min]="0" />
  </div>

  <!-- Actions -->
  <div class="form-actions">
    <button pButton type="button" label="Cancelar" class="p-button-outlined p-button-secondary" (click)="cancel()"></button>
    <button pButton type="submit" [label]="isEditMode ? 'Actualizar' : 'Crear'" [loading]="saving" [disabled]="form.invalid"></button>
  </div>
</form>
