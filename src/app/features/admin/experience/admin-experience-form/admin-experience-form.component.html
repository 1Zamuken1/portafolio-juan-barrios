<p-toast />

<div class="form-header">
  <h2 class="font-code-lg">{{ isEditMode ? 'Editar' : 'Nueva' }} Experiencia</h2>
</div>

<div *ngIf="loading" class="loading-state" style="padding: 3rem; text-align: center;">
  <i class="pi pi-spin pi-spinner" style="font-size: 2rem"></i>
  <p style="margin-top: 1rem;">Cargando...</p>
</div>

<form *ngIf="!loading" [formGroup]="form" (ngSubmit)="onSubmit()" class="admin-form">
  <!-- Company -->
  <div class="form-group">
    <label for="company">Empresa *</label>
    <input pInputText id="company" formControlName="company" placeholder="Nombre de la empresa" />
  </div>

  <!-- Role -->
  <div class="form-group">
    <label for="role">Rol / Cargo *</label>
    <input pInputText id="role" formControlName="role" placeholder="Ej: Desarrollador Backend" />
  </div>

  <!-- Period -->
  <div class="form-group">
    <label for="period">Período *</label>
    <input pInputText id="period" formControlName="period" placeholder="Ej: Ene 2024 - Presente" />
  </div>

  <!-- Description -->
  <div class="form-group">
    <label for="description">Descripción</label>
    <textarea pInputTextarea id="description" formControlName="description" rows="4" placeholder="Descripción del rol y responsabilidades"></textarea>
  </div>

  <!-- Achievements -->
  <div class="form-group">
    <label for="achievementsStr">Logros (separados por coma)</label>
    <input pInputText id="achievementsStr" formControlName="achievementsStr" placeholder="Logro 1, Logro 2, etc." />
  </div>

  <!-- Display Order -->
  <div class="form-group">
    <label for="displayOrder">Orden de Visualización</label>
    <p-inputNumber id="displayOrder" formControlName="displayOrder" [showButtons]="true" [min]="0" />
  </div>

  <!-- Actions -->
  <div class="form-actions">
    <button pButton type="button" label="Cancelar" class="p-button-outlined p-button-secondary" (click)="cancel()"></button>
    <button pButton type="submit" [label]="isEditMode ? 'Actualizar' : 'Crear'" [loading]="saving" [disabled]="form.invalid"></button>
  </div>
</form>
