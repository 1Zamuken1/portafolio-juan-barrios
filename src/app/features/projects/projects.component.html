<section class="section" id="projects">
  <div class="container">
    <div class="stitch-projects-header" style="margin-bottom: var(--space-4xl);">
      <h2 class="font-code-md tracking-widest uppercase text-primary" style="margin-bottom: var(--space-sm); font-size: 1.1rem; opacity: 0.7;">02 // ARCHIVO DE ARQUITECTURA</h2>
      <p class="font-headline-md text-primary" style="font-size: clamp(2rem, 4vw, 3rem); font-weight: 700;">
        Proyectos Destacados
      </p>
    </div>

    <div class="projects-grid">
      @for (project of projects(); track project.id; let i = $index) {
        <app-project-card
          [project]="project"
          [index]="i"
          (viewMore)="openModal(project)"
        />
      }
    </div>
  </div>

  <!-- Project Detail Modal -->
  @if (selectedProject()) {
    <app-project-modal
      [project]="selectedProject()!"
      (close)="closeModal()"
    />
  }
</section>
