<section class="hero" id="hero">
  <!-- Subtle Background matching the rest of the site (Stitch Celestial Motif) -->
  <div class="hero-bg">
    <div class="celestial-orbit"></div>
    <div class="glow-orb glow-orb-primary"></div>
  </div>

  <div class="hero-content container">
    <div class="hero-layout">
      <!-- Left side: Text Content -->
      <div class="hero-text-section">
        <p class="hero-role font-code-md tracking-widest uppercase">Desarrollador Backend Senior</p>
        <h1 class="hero-title font-display-lg text-primary mb-6">
          Diseñando <br />
          <span class="opacity-dim">Sistemas Escalables.</span>
        </h1>
        <div class="hero-subtitle mb-4">
          <i class="fas fa-terminal"></i>
          <span class="font-code-md">Java • Spring Boot • Python</span>
          <span class="typewriter-cursor">|</span>
        </div>
        <p class="hero-description font-body-lg text-secondary max-w-md leading-relaxed">
          Ingeniería de infraestructuras distribuidas de alta concurrencia. Lógica de precisión para el ecosistema cloud moderno.
        </p>

        <!-- Action Buttons -->
        <div class="hero-actions mt-8">
          <button class="btn-solid" (click)="scrollTo('projects')" pRipple>
            <i class="fas fa-code"></i>
            VER PROYECTOS
          </button>
          <a href="JuanBarrios-CV.pdf" download class="btn-ghost" pRipple>
            <i class="fas fa-file-pdf"></i>
            CONTACTO
          </a>
        </div>
        
        <!-- Social Links -->
        <div class="hero-social mt-6">
          <a href="https://github.com/1Zamuken1" target="_blank" rel="noopener noreferrer"
             class="social-icon" pTooltip="GitHub" tooltipPosition="bottom" aria-label="GitHub">
            <i class="fab fa-github"></i>
          </a>
          <a href="https://linkedin.com/in/juan-barrios-a8a651274" target="_blank" rel="noopener noreferrer"
             class="social-icon" pTooltip="LinkedIn" tooltipPosition="bottom" aria-label="LinkedIn">
            <i class="fab fa-linkedin"></i>
          </a>
          <a href="https://mail.google.com/mail/?view=cm&fs=1&to=juanbarrios072@gmail.com"
             target="_blank" rel="noopener noreferrer"
             class="social-icon" pTooltip="Email" tooltipPosition="bottom" aria-label="Email">
            <i class="fas fa-envelope"></i>
          </a>
        </div>
      </div>

      <!-- Right side: Avatar & Visuals -->
      <div class="hero-visual-section animate-fade-in-scale" style="animation-delay: 0.2s">
        <div class="hero-avatar-container">
          <div class="hero-avatar-ring"></div>
          <img
            src="assets/images/hero/profile.jpg"
            alt="Juan Esteban Barrios"
            class="hero-avatar"
            loading="eager"
          />
          
          <!-- Floating mini badges -->
          <div class="floating-badge badge-java animate-float" style="animation-delay: 0s">
            <i class="devicon-java-plain"></i>
          </div>
          <div class="floating-badge badge-spring animate-float" style="animation-delay: 1.5s">
            <i class="devicon-spring-plain"></i>
          </div>
          <div class="floating-badge badge-python animate-float" style="animation-delay: 3s">
            <i class="devicon-python-plain"></i>
          </div>
        </div>
      </div>
    </div>
  </div>
  
  <!-- Scroll Indicator -->
  <div class="absolute bottom-10 left-margin-mobile animate-bounce opacity-30 scroll-indicator">
    <i class="fas fa-arrow-down"></i>
  </div>
</section>
